<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form & Video Banner</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>

        header {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 0;
            color: white;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 10;
        }
        .logo {
            font-size: 22px;
            font-weight: bold;
        }
        .nav-list {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
        }
        .nav-list li a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        .nav-list li a:hover {
            text-decoration: underline;
        }
        body {
            padding-top: 80px; 
            background-color: #f8f9fa;
        }
        .video-banner {
            position: relative;
            width: 100%;
            max-height: 400px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            border-radius: 8px;
        }
        .video-banner video {
            width: 100%;
            height: auto;
            opacity: 0.8;
        }
        .video-banner h1 {
            position: absolute;
            color: white;
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
            margin: 0;
        }
    </style>
</head>
<body>

    <header>
        <div class="container d-flex justify-content-between align-items-center">
            <div class="logo">Kittapat Chittringarm</div>
            <ul class="nav-list d-flex">
                <li><a href="#">หน้าแรก</a></li>
                <li><a href="#">ข้อมูลบริษัท</a></li>
                <li><a href="#">บริการ</a></li>
                <li><a href="#">เกี่ยวกับเรา</a></li>
            </ul>
        </div>
    </header>

    <div class="container mt-4">
        <div class="video-banner shadow-sm">
            <video autoplay loop muted>
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            </video>
            <h1>Kittapat Chittringarm</h1>
        </div>

        <div class="text-center mt-3 video-controls">
            <button class="btn btn-warning me-2" onclick="document.querySelector('video').play()">
                <i class="bi bi-play-circle"></i> Play
            </button>
            <button class="btn btn-danger" onclick="document.querySelector('video').pause()">
                <i class="bi bi-pause-circle"></i> Pause
            </button>
        </div>
    </div>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h2 class="text-center mb-4">แบบฟอร์มลงทะเบียน</h2>
                        <form action="#" method="post">
                            
                            <div class="mb-3">
                              <label for="fullname" class="form-label">ชื่อ-นามสกุล:</label>
                              <input type="text" class="form-control" id="fullname" name="fullname" placeholder="กรุณากรอกชื่อ-นามสกุล" required>
                            </div>
                            
                            <div class="mb-3">
                              <label for="email" class="form-label">อีเมล:</label>
                              <input type="email" class="form-control" id="email" name="email" placeholder="example@domain.com" required>
                            </div>
                            
                            <div class="mb-3">
                              <label for="password" class="form-label">รหัสผ่าน:</label>
                              <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            
                            <div class="mb-3">
                              <label class="form-label d-block">เพศ:</label>
                              <div class="form-check form-check-inline">
                                  <input class="form-check-input" type="radio" id="male" name="gender" value="male" checked>
                                  <label class="form-check-label" for="male">ชาย</label>
                              </div>
                              <div class="form-check form-check-inline">
                                  <input class="form-check-input" type="radio" id="female" name="gender" value="female">
                                  <label class="form-check-label" for="female">หญิง</label>
                              </div>
                            </div>
                            
                            <div class="mb-4">
                              <label for="position" class="form-label">ตำแหน่ง:</label>
                              <select class="form-select" id="position" name="position" required>
                                <option value="" selected disabled>Please select a position</option>
                                <option value="manager">Manager</option>
                                <option value="developer">Developer</option>
                                <option value="designer">Designer</option>
                                <option value="marketing">Marketing</option>
                              </select>
                            </div>
                            
                            <div class="text-center">
                              <button type="submit" class="btn btn-primary px-4 me-2">ลงทะเบียน</button>
                              <button type="reset" class="btn btn-secondary px-4">ล้างข้อมูล</button>
                            </div>
                            
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
